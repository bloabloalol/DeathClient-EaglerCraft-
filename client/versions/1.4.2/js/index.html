        <script type="text/javascript">
        "use strict";
        window.addEventListener("load", function() {
            if (window.location.href.indexOf("file:") === 0) {
                alert("HTTP please, do not open this file locally, run a local HTTP server and load it via HTTP");
                return;
            }

            var relayId = Math.floor(Math.random() * 3);
            window.eaglercraftXOpts = {
                demoMode: false,
                container: "game_frame",
                assetsURI: "assets.epk",
                localesURI: "lang/",
                worldsDB: "worlds",
                wispServerURL: "wss://deathclient-eaglercraft.onrender.com",
                logInvalidCerts: true,
                crashOnUncaughtExceptions: true,
                enableDownloadOfflineButton: false,
                checkRelaysForUpdates: true,
                downloadOfflineButtonLink: "https://github.com/Death68093/DeathClient-EaglerCraft-/releases",
                servers: [
                    { addr: "wss://burstmc.eagler.host", name: "BurstMC Server1" },
                    { addr: "wss://wanderwood.thatonebot.site", name: "WanderWood" },
                    { addr: "complex.lat", name: "Complex" },
                    { addr: "wss://mc.archyverse.org", name: "ArchyVerse" },
                    { addr: "wss://mc.voidsent.net", name: "Voidsent" },
                    { addr: "wss://arch.mct", name: "ArchMC" }
                ],
                relays: [
                    { addr: "wss://relay.deev.is/", comment: "lax1dude relay #1", primary: relayId === 0 },
                    { addr: "wss://relay.lax1dude.net/", comment: "lax1dude relay #2", primary: relayId === 1 },
                    { addr: "wss://relay.shhnowisnottheti.me/", comment: "ayunami relay #1", primary: relayId === 2 }
                ]
            };

            var q = window.location.search;
            if ((typeof q === "string") && q[0] === "?" && (typeof window.URLSearchParams !== "undefined")) {
                q = new window.URLSearchParams(q);
                var s = q.get("server");
                if (s) window.eaglercraftXOpts.joinServer = s;
            }

            if (typeof window.__deathclientBootWisp === "function") {
                try {
                    window.__deathclientBootWisp();
                } catch (err) {
                    console.error("[Wisp] Boot error:", err);
                }
            }

            main();
        });
        </script>

	<body style="margin:0px;width:100%;height:100%;overflow:hidden;background-color:black;" id="game_frame">
		<!-- Disabled VC for now
		<script>
		let voiceWs = null;
		let micStream = null;
		let mediaRecorder = null;
		let myUsername = null;

		let vcSettings = { enabled: true, pttKeyCode: 'KeyV' };

		['log', 'info', 'warn', 'error'].forEach(function(method) {
			const originalConsoleFunc = console[method];
			console[method] = function(...args) {
				if (args[0] && typeof args[0] === 'string') {

					if (args[0].includes("[DEATH-VC-SYNC]")) {
						try {
							const jsonStr = args[0].substring(args[0].indexOf("{"));
							const data = JSON.parse(jsonStr);

							vcSettings.enabled = data.enabled;
							vcSettings.pttKeyCode = data.ptt;

							if (!vcSettings.enabled) stopVoiceChat();
							else if (myUsername) startVoiceChat();

							originalConsoleFunc.apply(console, ["[DEATH-VC] Settings Synced!"]);
							return;
						} catch(e){}
					}

					else if (args[0].includes("[DEATH-VC-JOIN]")) {
						myUsername = args[0].split("[DEATH-VC-JOIN]")[1].trim();

						console.log("[DEATH-VC] Linked to player: " + myUsername);

						if (vcSettings.enabled) setTimeout(() => startVoiceChat(), 500);
						return;
					}
				}
				originalConsoleFunc.apply(console, args);
			};
		});

		window.addEventListener('keydown', (e) => {
			if (vcSettings.enabled && e.code === vcSettings.pttKeyCode && mediaRecorder && !e.repeat) {
				if (mediaRecorder.state === 'inactive') {
					mediaRecorder.start();
				}
			}
		}, { capture: true });

		window.addEventListener('keyup', (e) => {
			if (vcSettings.enabled && e.code === vcSettings.pttKeyCode && mediaRecorder) {
				if (mediaRecorder.state === 'recording') {
					mediaRecorder.stop();
				}
			}
		}, { capture: true });

		async function startVoiceChat() {
			if (!myUsername || !vcSettings.enabled) return;
			if (voiceWs && voiceWs.readyState === WebSocket.OPEN) return;

			try {
				micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

				voiceWs = new WebSocket("wss://deathclient-chat.deathevents.lol");
				voiceWs.binaryType = "blob";

				voiceWs.onopen = () => {
					voiceWs.send(JSON.stringify({ type: 'join-voice', user: myUsername }));

					mediaRecorder = new MediaRecorder(micStream);

					mediaRecorder.ondataavailable = (e) => {
						if (e.data.size > 0 && voiceWs.readyState === WebSocket.OPEN) {
							voiceWs.send(e.data);
						}
					};
				};

				voiceWs.onmessage = (e) => {
					if (e.data instanceof Blob) {
						const audioURL = URL.createObjectURL(e.data);
						const audioObj = new Audio(audioURL);

						audioObj.onended = () => URL.revokeObjectURL(audioURL);

						audioObj.play().catch(err => console.log("Playback blocked by browser:", err));
					}
				};
			} catch (err) {
				console.error("[DEATH-VC] Mic error: ", err);
			}
		}

		function stopVoiceChat() {
			if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
			if (micStream) micStream.getTracks().forEach(t => t.stop());
			if (voiceWs) voiceWs.close();
			mediaRecorder = null; micStream = null; voiceWs = null;
		}
		</script>
